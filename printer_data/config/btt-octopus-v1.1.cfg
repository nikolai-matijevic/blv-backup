########################################
# TMC2209 configuration
########################################

[tmc2209 stepper_x]
uart_pin: PC4
diag_pin: PG6
run_current: 1.0
#driver_SGTHRS: 82
#stealthchop_threshold: 999999
interpolate: True

[tmc2209 stepper_y]
uart_pin: PD11
diag_pin: PG9
run_current: 1.0
#driver_SGTHRS: 65
#stealthchop_threshold: 999999
interpolate: True

[tmc2209 stepper_z]
uart_pin: PC6
##diag_pin: PG10
run_current: 0.7
stealthchop_threshold: 999999
interpolate: True

[tmc2209 stepper_z1]
uart_pin: PC7
##diag_pin: PG11
run_current: 0.7
stealthchop_threshold: 999999
interpolate: True

