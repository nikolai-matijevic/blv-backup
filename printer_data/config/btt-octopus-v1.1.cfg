max_power: 1.0
shutdown_speed: 0.0
fan_speed: 1.0
#fan_speed: 0.5
stepper: stepper_x

[controller_fan motor_b_fan]
pin: PE5
max_power: 1.0
shutdown_speed: 0.0
fan_speed: 1.0
#fan_speed: 0.5
stepper: stepper_y

